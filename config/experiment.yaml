experiment:
  name: math-dapo-research
  seed: 42
  output_dir: ../outputs/math-dapo-research

data:
  train_files:
    - ../data/math/train.jsonl
  val_files:
    - ../data/math/val.jsonl
  format: jsonl
  prompt_key: prompt
  answer_key: ground_truth
  train_batch_size: 32
  gen_batch_size: 64
  max_prompt_length: 2048
  max_response_length: 20480
  rollout_n: 8

reward:
  terms:
    - name: accuracy
      kind: math_accuracy
      weight: 1.0
    - name: boxed_format
      kind: boxed_format
      weight: 0.05
  overlong:
    enabled: true
    mode: shaping
    buffer_length: 4096
    penalty_factor: 1.0
    hard_filter: false
    log: true

algorithm:
  # Switch to `grpo`, `dapo`, or `gdpo`.
  variant: dapo
  advantage:
    mode: grpo
    normalize_by_std: true
  gdpo:
    # GDPO uses raw reward component names from reward.terms.
    component_keys:
      - accuracy
      - boxed_format
    component_weights:
      - 1.0
      - 0.05
    normalize_by_std: true
    batch_whiten: true
    allow_single_component_ablation: false
  policy_loss:
    mode: clipped
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    clip_ratio_c: 3.0
    loss_agg_mode: token-mean
  group_filtering:
    # Keep this false for strict GDPO v1.
    enabled: true
    metric: acc
    max_num_gen_batches: 10
    require_variance: true
  kl:
    enabled: false
    source: reward
    penalty: low_var_kl
  trainer_order:
    stages:
      - rollout
      - reward
      - kl
      - filtering
      - advantage
      - actor_update
      - diagnostics
  rollout_behavior:
    backend: vllm
    do_sample: true
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    # Keep this false for strict GDPO v1.
    accumulate_filtered_groups: true

trainer:
  log_level: info
  diagnostics:
    record_stage_events: true
    emit_group_stats: true
    emit_reward_breakdown: true
  save_freq: 100
  test_freq: 100
  val_before_train: true

verl:
  required_commit: "08e030d9b0d6f3c5c2f154ec28bf2ccb37cab375"
  runtime_stack: fsdp_vllm
  strict_compatibility: false
  model_path: Qwen/Qwen2.5-7B
  trust_remote_code: false
  actor:
    ppo_micro_batch_size_per_gpu: 2
    grad_clip: 1.0
    ppo_epochs: 1
  rollout:
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.5
    enforce_eager: true
  reference_policy: true
  critic: false

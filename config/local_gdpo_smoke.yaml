experiment:
  name: local-gdpo-smoke
  seed: 7
  output_dir: ../outputs/local-gdpo-smoke

data:
  train_files:
    - ../data/smoke/math/train.jsonl
  val_files:
    - ../data/smoke/math/val.jsonl
  format: jsonl
  prompt_key: prompt
  answer_key: ground_truth
  train_batch_size: 2
  gen_batch_size: 4
  max_prompt_length: 256
  max_response_length: 48
  rollout_n: 4

reward:
  terms:
    - name: accuracy
      kind: math_accuracy
      weight: 1.0
    - name: boxed_format
      kind: boxed_format
      weight: 0.1
  overlong:
    enabled: false
    mode: disabled
    buffer_length: 0
    penalty_factor: 0.0
    hard_filter: false
    log: false

algorithm:
  variant: gdpo
  advantage:
    mode: grpo
    normalize_by_std: true
  gdpo:
    component_keys:
      - accuracy
      - boxed_format
    component_weights:
      - 1.0
      - 0.1
    normalize_by_std: true
    batch_whiten: true
    allow_single_component_ablation: false
  policy_loss:
    mode: clipped
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    clip_ratio_c: null
    loss_agg_mode: token-mean
  group_filtering:
    enabled: false
    metric: acc
    max_num_gen_batches: 1
    require_variance: true
  kl:
    enabled: false
    source: reward
    penalty: low_var_kl
  trainer_order:
    stages:
      - rollout
      - reward
      - kl
      - filtering
      - advantage
      - actor_update
      - diagnostics
  rollout_behavior:
    backend: local-smoke
    do_sample: false
    temperature: 0.0
    top_p: 1.0
    top_k: -1
    accumulate_filtered_groups: false

trainer:
  log_level: info
  max_steps: 0
  diagnostics:
    record_stage_events: true
    emit_group_stats: true
    emit_reward_breakdown: true
    report_path: ../outputs/local-gdpo-smoke/local_smoke_report.json
  save_freq: 0
  test_freq: 0
  val_before_train: false

verl:
  required_commit: "7dc46e834209948cf1cdd8a04d83f82b4a7efd24"
  runtime_stack: local_smoke
  strict_compatibility: false
  model_path: not-used-in-local-smoke
  trust_remote_code: false
  actor:
    ppo_micro_batch_size_per_gpu: 1
    grad_clip: 1.0
    ppo_epochs: 1
  rollout:
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.0
    enforce_eager: true
  reference_policy: false
  critic: false
